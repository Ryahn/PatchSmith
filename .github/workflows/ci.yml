name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version
        id: ver
        shell: bash
        run: |
          V=$(python -c "import runpy; print(runpy.run_path('patcher/version.py')['__version__'])")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller — ApplyPatch
        run: pyinstaller --noconfirm packaging/apply_patch.spec

      - name: PyInstaller — PatchSmith
        run: pyinstaller --noconfirm packaging/patchsmith_windows.spec

      - name: Upload ApplyPatch (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: ApplyPatch-${{ steps.ver.outputs.version }}-Windows
          path: dist/ApplyPatch-${{ steps.ver.outputs.version }}.exe

      - name: Upload PatchSmith (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: PatchSmith-${{ steps.ver.outputs.version }}-Windows
          path: dist/PatchSmith-${{ steps.ver.outputs.version }}.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version
        id: ver
        shell: bash
        run: |
          V=$(python -c "import runpy; print(runpy.run_path('patcher/version.py')['__version__'])")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Install p7zip, 7za-linux, and Qt libs for PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full \
            libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
            libgl1 libfontconfig1 libfreetype6 libdbus-1-3 libsm6 libice6
          cp /usr/bin/7za bin/7za-linux
          chmod +x bin/7za-linux bin/xdelta3-linux

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller — ApplyPatch (Linux)
        run: pyinstaller --noconfirm packaging/apply_patch_linux.spec

      - name: PyInstaller — PatchSmith (Linux)
        run: pyinstaller --noconfirm packaging/patchsmith_linux.spec

      - name: Upload ApplyPatch (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: ApplyPatch-${{ steps.ver.outputs.version }}-Linux
          path: dist/ApplyPatch-${{ steps.ver.outputs.version }}

      - name: Upload PatchSmith (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: PatchSmith-${{ steps.ver.outputs.version }}-Linux
          path: dist/PatchSmith-${{ steps.ver.outputs.version }}
