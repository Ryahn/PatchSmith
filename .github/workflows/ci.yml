name: CI

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read version
        id: ver
        shell: bash
        run: |
          V=$(python -c "import runpy; print(runpy.run_path('patcher/version.py')['__version__'])")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller — ApplyPatch
        run: pyinstaller --noconfirm packaging/apply_patch.spec

      - name: PyInstaller — PatchSmith
        run: pyinstaller --noconfirm packaging/patchsmith_windows.spec

      - name: Upload ApplyPatch (Windows)
        uses: actions/upload-artifact@v7
        with:
          name: ApplyPatch-${{ steps.ver.outputs.version }}-Windows
          path: dist/ApplyPatch-${{ steps.ver.outputs.version }}.exe

      - name: Upload PatchSmith (Windows)
        uses: actions/upload-artifact@v7
        with:
          name: PatchSmith-${{ steps.ver.outputs.version }}-Windows
          path: dist/PatchSmith-${{ steps.ver.outputs.version }}.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read version
        id: ver
        shell: bash
        run: |
          V=$(python -c "import runpy; print(runpy.run_path('patcher/version.py')['__version__'])")
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Install p7zip, 7za-linux, and Qt libs for PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full \
            libegl1 libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 \
            libgl1 libfontconfig1 libfreetype6 libdbus-1-3 libsm6 libice6
          cp /usr/bin/7za bin/7za-linux
          chmod +x bin/7za-linux bin/xdelta3-linux

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: PyInstaller — ApplyPatch (Linux)
        run: pyinstaller --noconfirm packaging/apply_patch_linux.spec

      - name: PyInstaller — PatchSmith (Linux)
        run: pyinstaller --noconfirm packaging/patchsmith_linux.spec

      - name: Upload ApplyPatch (Linux)
        uses: actions/upload-artifact@v7
        with:
          name: ApplyPatch-${{ steps.ver.outputs.version }}-Linux
          path: dist/ApplyPatch-${{ steps.ver.outputs.version }}

      - name: Upload PatchSmith (Linux)
        uses: actions/upload-artifact@v7
        with:
          name: PatchSmith-${{ steps.ver.outputs.version }}-Linux
          path: dist/PatchSmith-${{ steps.ver.outputs.version }}

  publish-release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches patcher/version.py
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          FILE_VER=$(python -c "import runpy; print(runpy.run_path('patcher/version.py')['__version__'])")
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' implies version '$TAG_VER' but patcher/version.py has __version__='$FILE_VER'. Bump version.py or fix the tag."
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          pattern: "*"
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: PatchSmith ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
